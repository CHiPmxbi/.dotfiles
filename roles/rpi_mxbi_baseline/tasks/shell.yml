---
- name: Set Zsh as the default shell
  become: true
  ansible.builtin.user:
    name: "{{ rpi_mxbi_baseline_user }}"
    shell: /usr/bin/zsh

- name: Deploy the Zsh configuration
  become: true
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ rpi_mxbi_baseline_home }}/.zshrc"
    owner: "{{ rpi_mxbi_baseline_user }}"
    group: "{{ rpi_mxbi_baseline_group }}"
    mode: '0644'

- name: Create the LXTerminal configuration directory
  become: true
  ansible.builtin.file:
    path: "{{ rpi_mxbi_baseline_home }}/.config/lxterminal"
    state: directory
    owner: "{{ rpi_mxbi_baseline_user }}"
    group: "{{ rpi_mxbi_baseline_group }}"
    mode: '0755'

- name: Deploy the LXTerminal configuration
  become: true
  ansible.builtin.copy:
    src: lxterminal/lxterminal.conf
    dest: "{{ rpi_mxbi_baseline_home }}/.config/lxterminal/lxterminal.conf"
    owner: "{{ rpi_mxbi_baseline_user }}"
    group: "{{ rpi_mxbi_baseline_group }}"
    mode: '0644'
