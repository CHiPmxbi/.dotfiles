---
- name: Reload and restart the cogmoteGO user service
  become: true
  become_user: "{{ experiment_user }}"
  ansible.builtin.systemd_service:
    name: cogmoteGO.service
    scope: user
    daemon_reload: true
    state: restarted
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ experiment_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ experiment_uid }}/bus"
  when: not ansible_check_mode
