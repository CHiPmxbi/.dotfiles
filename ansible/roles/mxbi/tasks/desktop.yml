---
- name: Query the VNC status
  become: true
  ansible.builtin.command:
    cmd: raspi-config nonint get_vnc
  register: mxbi_vnc_status
  changed_when: false
  check_mode: false

- name: Enable VNC
  become: true
  ansible.builtin.command:
    cmd: raspi-config nonint do_vnc 0
  when: mxbi_vnc_status.stdout | trim != '0'
  changed_when: true
